<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --win-blue: #0067c0;
            --win-bg: #f3f3f3;
            --win-border: #e5e5e5;
        }
        body {
            margin: 0;
            height: 100vh;
            background: rgba(0, 0, 0, 0.45); /* デスクトップの暗転 */
            backdrop-filter: blur(12px);    /* 背面のボカシ */
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", "Meiryo", sans-serif;
            user-select: none;
        }
        .uac-window {
            width: 440px;
            background: var(--win-bg);
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.3);
            animation: uac-appear 0.15s cubic-bezier(0, 0, 0, 1);
        }
        @keyframes uac-appear {
            from { transform: scale(1.05); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .header {
            padding: 20px 24px 8px;
            display: flex;
            align-items: center;
            font-size: 13px;
            color: #333;
        }
        .shield-icon { margin-right: 12px; font-size: 18px; }
        .main-content { padding: 0 24px 24px; }
        .headline {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 20px;
            color: #000;
        }
        .app-card {
            display: flex;
            background: #fff;
            padding: 12px;
            border: 1px solid var(--win-border);
            border-radius: 4px;
            margin-bottom: 16px;
        }
        .app-icon { font-size: 32px; margin-right: 16px; }
        .app-text { font-size: 12px; line-height: 1.5; color: #555; }
        .app-name { font-size: 14px; font-weight: 600; color: #000; }
        
        .auth-section { margin-top: 16px; }
        .user-info { display: flex; align-items: center; margin-bottom: 8px; font-size: 14px; }
        .avatar { width: 24px; height: 24px; background: var(--win-blue); border-radius: 50%; margin-right: 10px; }
        
        .input-wrapper { position: relative; }
        input[type="password"] {
            width: 100%;
            padding: 7px 10px;
            border: 1px solid #858585;
            border-bottom: 2px solid var(--win-blue);
            background: #fff;
            outline: none;
            box-sizing: border-box;
            border-radius: 4px 4px 0 0;
            font-size: 14px;
        }
        .more-choices {
            display: block;
            margin-top: 16px;
            font-size: 13px;
            color: var(--win-blue);
            text-decoration: none;
        }
        .footer {
            background: #eee;
            padding: 16px 24px;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            border-top: 1px solid #ddd;
            border-radius: 0 0 8px 8px;
        }
        button {
            min-width: 90px;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid #ccc;
        }
        .btn-yes { background: var(--win-blue); color: white; border: none; font-weight: 500; }
        .btn-yes:hover { background: #005aab; }
        .btn-no { background: #fff; color: #000; }
        .btn-no:hover { background: #f9f9f9; }
    </style>
</head>
<body>

<div class="uac-window">
    <div class="header">
        <span class="shield-icon">🛡️</span>
        ユーザー アカウント制御
    </div>
    <div class="main-content">
        <div class="headline">このアプリがデバイスに変更を加えることを許可しますか?</div>
        <div class="app-card">
            <div class="app-icon">🤖</div>
            <div class="app-text">
                <div class="app-name">AI Assistant Pro</div>
                <div>確認済みの発行元: OpenAI/Google/Microsoft/You</div>
                <div>ファイルの入手先: このハード ドライブ上の場所</div>
            </div>
        </div>
        <div class="auth-section">
            <div class="user-info"><div class="avatar"></div><strong>Admin User</strong></div>
            <div class="input-wrapper">
                <input type="password" placeholder="パスワード">
            </div>
        </div>
        <a href="#" class="more-choices">詳細を表示</a>
    </div>
    <div class="footer">
        <button class="btn-yes">はい</button>
        <button class="btn-no">いいえ</button>
    </div>
</div>

</body>
</html>
